<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DashMetri</title>
  <style>
    :root {
      --bg-top: #081427;
      --bg-mid: #102b52;
      --bg-bottom: #05111f;
      --panel: rgba(4, 10, 22, 0.78);
      --line: rgba(255, 255, 255, 0.12);
      --text: #f4fbff;
      --muted: #93b7d9;
      --accent: #33f0ff;
      --accent-2: #ff4d8d;
      --warning: #ffd54a;
      --danger: #ff5d5d;
      --ground-1: #0f1c3b;
      --ground-2: #173461;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      overflow: hidden;
      font-family: "Trebuchet MS", "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 20% 20%, rgba(51, 240, 255, 0.18), transparent 20%),
        radial-gradient(circle at 80% 10%, rgba(255, 77, 141, 0.16), transparent 22%),
        linear-gradient(180deg, var(--bg-top) 0%, var(--bg-mid) 48%, var(--bg-bottom) 100%);
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background:
        linear-gradient(90deg, rgba(255, 255, 255, 0.04) 1px, transparent 1px),
        linear-gradient(180deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
      background-size: 60px 60px;
      opacity: 0.28;
      pointer-events: none;
    }

    #game-shell {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    .hud,
    .overlay,
    .mobile-button {
      position: absolute;
      z-index: 2;
    }

    .hud {
      top: 18px;
      left: 18px;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      max-width: min(92vw, 700px);
    }

    .card {
      padding: 10px 14px;
      border: 1px solid var(--line);
      background: var(--panel);
      border-radius: 14px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
      backdrop-filter: blur(10px);
    }

    .label {
      display: block;
      font-size: 11px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 4px;
    }

    .value {
      font-size: 20px;
      font-weight: 700;
    }

    .overlay {
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: linear-gradient(180deg, rgba(1, 5, 14, 0.35), rgba(1, 5, 14, 0.7));
      transition: opacity 0.25s ease;
    }

    .overlay.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .panel {
      width: min(92vw, 560px);
      padding: 28px;
      border-radius: 22px;
      border: 1px solid rgba(255, 255, 255, 0.15);
      background:
        linear-gradient(180deg, rgba(10, 22, 45, 0.92), rgba(5, 13, 28, 0.92));
      box-shadow: 0 25px 80px rgba(0, 0, 0, 0.38);
      text-align: center;
    }

    h1 {
      margin: 0 0 10px;
      font-size: clamp(34px, 6vw, 70px);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--accent);
      text-shadow: 0 0 18px rgba(51, 240, 255, 0.35);
    }

    .subtitle {
      margin: 0 0 20px;
      color: var(--muted);
      font-size: clamp(15px, 2.4vw, 19px);
      line-height: 1.5;
    }

    .controls {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 10px;
      margin: 20px 0 10px;
    }

    button {
      border: 0;
      border-radius: 999px;
      padding: 12px 20px;
      background: linear-gradient(135deg, var(--accent), #3d96ff);
      color: #03101d;
      font-size: 15px;
      font-weight: 800;
      letter-spacing: 0.04em;
      cursor: pointer;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
      box-shadow: 0 10px 22px rgba(61, 150, 255, 0.28);
    }

    button:hover,
    button:focus-visible {
      transform: translateY(-1px) scale(1.02);
    }

    .alt {
      background: linear-gradient(135deg, #ff6c94, var(--accent-2));
      color: white;
      box-shadow: 0 10px 22px rgba(255, 77, 141, 0.24);
    }

    .tiny {
      margin-top: 10px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
    }

    .mobile-button {
      right: 20px;
      bottom: 20px;
      width: 82px;
      height: 82px;
      border-radius: 50%;
      border: 1px solid rgba(255, 255, 255, 0.16);
      background:
        radial-gradient(circle at 35% 30%, rgba(255, 255, 255, 0.2), transparent 30%),
        linear-gradient(180deg, rgba(51, 240, 255, 0.25), rgba(61, 150, 255, 0.16));
      color: white;
      font-size: 13px;
      font-weight: 800;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      display: none;
      align-items: center;
      justify-content: center;
      user-select: none;
      -webkit-user-select: none;
      touch-action: manipulation;
      box-shadow: 0 14px 28px rgba(0, 0, 0, 0.28);
    }

    @media (max-width: 900px) {
      .mobile-button {
        display: flex;
      }
    }
  </style>
</head>
<body>
  <div id="game-shell">
    <canvas id="gameCanvas"></canvas>

    <div class="hud">
      <div class="card">
        <span class="label">Progress</span>
        <span class="value" id="progressValue">0%</span>
      </div>
      <div class="card">
        <span class="label">Attempts</span>
        <span class="value" id="attemptValue">1</span>
      </div>
      <div class="card">
        <span class="label">Status</span>
        <span class="value" id="statusValue">Ready</span>
      </div>
    </div>

    <div class="overlay" id="overlay">
      <div class="panel">
        <h1 id="overlayTitle">DashMetri</h1>
        <p class="subtitle" id="overlayText">
          Jump over spikes, land on platforms, and survive to the end.
          Press <strong>Space</strong>, click, or tap to jump.
        </p>
        <div class="controls">
          <button id="startButton">Start Run</button>
          <button id="restartButton" class="alt">Restart</button>
        </div>
        <p class="tiny">
          This is a Geometry Dash-inspired one-button runner built in a single HTML file.
        </p>
      </div>
    </div>

    <div class="mobile-button" id="jumpButton">Jump</div>
  </div>

  <script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");

    const overlay = document.getElementById("overlay");
    const overlayTitle = document.getElementById("overlayTitle");
    const overlayText = document.getElementById("overlayText");
    const startButton = document.getElementById("startButton");
    const restartButton = document.getElementById("restartButton");
    const jumpButton = document.getElementById("jumpButton");
    const progressValue = document.getElementById("progressValue");
    const attemptValue = document.getElementById("attemptValue");
    const statusValue = document.getElementById("statusValue");

    let width = 0;
    let height = 0;
    let groundY = 0;
    let lastTime = 0;

    const game = {
      speed: 430,
      gravityUp: 3000,
      gravityDown: 4200,
      jumpVelocity: 980,
      terminalVelocity: 1850,
      started: false,
      gameOver: false,
      finished: false,
      attempts: 1,
      distance: 0,
      courseLength: 7600
    };

    const player = {
      x: 150,
      y: 0,
      size: 42,
      vy: 0,
      rotation: 0,
      onGround: true,
      trail: []
    };

    const input = {
      held: false,
      queuedJump: false
    };

    const layout = [
      { type: "spike", x: 700, w: 56, h: 42 },
      { type: "spike", x: 1040, w: 56, h: 42 },
      { type: "block", x: 1340, w: 120, h: 36 },
      { type: "spike", x: 1500, w: 56, h: 42 },
      { type: "platform", x: 1700, w: 150, h: 26, y: 120 },
      { type: "spike", x: 1718, w: 50, h: 40, top: true, y: 120 + 26 },
      { type: "platform", x: 2070, w: 130, h: 26, y: 180 },
      { type: "platform", x: 2280, w: 150, h: 26, y: 240 },
      { type: "spike", x: 2510, w: 56, h: 42 },
      { type: "spike", x: 2580, w: 56, h: 42 },
      { type: "block", x: 2870, w: 140, h: 60 },
      { type: "platform", x: 3260, w: 170, h: 24, y: 140 },
      { type: "platform", x: 3510, w: 120, h: 24, y: 210 },
      { type: "spike", x: 3730, w: 56, h: 42 },
      { type: "spike", x: 3802, w: 56, h: 42 },
      { type: "platform", x: 4100, w: 180, h: 24, y: 110 },
      { type: "spike", x: 4335, w: 56, h: 42 },
      { type: "block", x: 4620, w: 150, h: 80 },
      { type: "spike", x: 4830, w: 56, h: 42 },
      { type: "platform", x: 5160, w: 150, h: 26, y: 170 },
      { type: "platform", x: 5410, w: 150, h: 26, y: 170 },
      { type: "spike", x: 5655, w: 56, h: 42 },
      { type: "platform", x: 5940, w: 150, h: 24, y: 120 },
      { type: "spike", x: 6160, w: 56, h: 42 },
      { type: "block", x: 6480, w: 170, h: 100 },
      { type: "spike", x: 6740, w: 56, h: 42 },
      { type: "spike", x: 6815, w: 56, h: 42 },
      { type: "platform", x: 7080, w: 210, h: 24, y: 190 }
    ];

    function resize() {
      width = window.innerWidth;
      height = window.innerHeight;
      canvas.width = width * devicePixelRatio;
      canvas.height = height * devicePixelRatio;
      canvas.style.width = width + "px";
      canvas.style.height = height + "px";
      ctx.setTransform(devicePixelRatio, 0, 0, devicePixelRatio, 0, 0);
      groundY = height - Math.max(110, height * 0.18);
      if (!game.started) {
        player.y = groundY - player.size;
      }
    }

    function startGame() {
      game.started = true;
      game.gameOver = false;
      game.finished = false;
      overlay.classList.add("hidden");
      statusValue.textContent = "Running";
      startButton.textContent = "Resume";
    }

    function resetGame(incrementAttempt = true) {
      if (incrementAttempt) {
        game.attempts += 1;
      }
      game.started = false;
      game.gameOver = false;
      game.finished = false;
      game.distance = 0;
      player.y = groundY - player.size;
      player.vy = 0;
      player.rotation = 0;
      player.onGround = true;
      player.trail = [];
      input.held = false;
      input.queuedJump = false;
      attemptValue.textContent = game.attempts;
      progressValue.textContent = "0%";
      statusValue.textContent = "Ready";
      overlayTitle.textContent = "DashMetri";
      overlayText.innerHTML =
        "Jump over spikes, land on platforms, and survive to the end. " +
        "Press <strong>Space</strong>, click, or tap to jump.";
      startButton.textContent = "Start Run";
      overlay.classList.remove("hidden");
    }

    function jump() {
      if (game.gameOver || game.finished) {
        resetGame(true);
      }
      if (!game.started) {
        startGame();
      }
      input.queuedJump = true;
      tryJump();
    }

    function tryJump() {
      if (!game.started || game.gameOver || game.finished) {
        return;
      }
      if (player.onGround && input.queuedJump) {
        player.vy = -game.jumpVelocity;
        player.onGround = false;
        input.queuedJump = false;
      }
    }

    function getObjectRect(obj) {
      if (obj.type === "platform") {
        const top = groundY - obj.y;
        return { x: obj.x - game.distance, y: top, w: obj.w, h: obj.h };
      }
      if (obj.type === "block") {
        const y = groundY - obj.h;
        return { x: obj.x - game.distance, y, w: obj.w, h: obj.h };
      }
      if (obj.type === "spike" && obj.top) {
        const y = groundY - obj.y;
        return { x: obj.x - game.distance, y, w: obj.w, h: obj.h };
      }
      const h = obj.h;
      const y = groundY - h;
      return { x: obj.x - game.distance, y, w: obj.w, h };
    }

    function isSolid(obj) {
      return obj.type === "platform" || obj.type === "block";
    }

    function isHazard(obj) {
      return obj.type === "spike";
    }

    function update(dt) {
      if (!game.started || game.gameOver || game.finished) {
        return;
      }

      game.distance += game.speed * dt;
      if (game.distance >= game.courseLength) {
        game.distance = game.courseLength;
        game.finished = true;
        game.started = false;
        statusValue.textContent = "Level Clear";
        overlayTitle.textContent = "Level Clear";
        overlayText.textContent = "You made it to the finish line. Hit restart and go for a cleaner run.";
        startButton.textContent = "Play Again";
        overlay.classList.remove("hidden");
        return;
      }

      const gravity = player.vy < 0 ? game.gravityUp : game.gravityDown;
      player.vy = Math.min(game.terminalVelocity, player.vy + gravity * dt);
      player.y += player.vy * dt;

      const previousOnGround = player.onGround;
      player.onGround = false;
      const floorY = groundY - player.size;

      if (player.y >= floorY) {
        player.y = floorY;
        player.vy = 0;
        player.onGround = true;
      }

      let landedOnPlatform = false;

      for (const obj of layout) {
        const rect = getObjectRect(obj);
        if (rect.x + rect.w < -80 || rect.x > width + 80) {
          continue;
        }

        if (isSolid(obj)) {
          const playerRect = { x: player.x, y: player.y, w: player.size, h: player.size };
          const playerBottom = player.y + player.size;
          const previousBottom = playerBottom - player.vy * dt;
          const touchingHorizontally =
            playerRect.x + playerRect.w > rect.x &&
            playerRect.x < rect.x + rect.w;
          const landing =
            touchingHorizontally &&
            previousBottom <= rect.y &&
            playerBottom >= rect.y &&
            player.vy >= 0;

          if (landing) {
            player.y = rect.y - player.size;
            player.vy = 0;
            player.onGround = true;
            landedOnPlatform = true;
          }
        }
      }

      const resolvedPlayerRect = { x: player.x, y: player.y, w: player.size, h: player.size };

      for (const obj of layout) {
        if (!isHazard(obj)) {
          continue;
        }

        const rect = getObjectRect(obj);
        if (rect.x + rect.w < -80 || rect.x > width + 80) {
          continue;
        }

        if (intersects(resolvedPlayerRect, rect)) {
          crash();
          return;
        }
      }

      if (!landedOnPlatform && player.y < floorY - 2 && previousOnGround && player.vy === 0) {
        player.onGround = false;
      }

      if (player.onGround && input.held) {
        input.queuedJump = true;
      }
      tryJump();

      player.rotation += (player.onGround ? 0 : 8.6) * dt;
      if (player.onGround) {
        player.rotation = snapRotation(player.rotation);
      }

      player.trail.push({
        x: player.x + player.size / 2,
        y: player.y + player.size / 2,
        life: 0.45
      });
      for (const piece of player.trail) {
        piece.x -= game.speed * dt;
        piece.life -= dt;
      }
      player.trail = player.trail.filter(piece => piece.life > 0);

      progressValue.textContent = Math.min(
        100,
        Math.floor((game.distance / game.courseLength) * 100)
      ) + "%";
    }

    function intersects(a, b) {
      return (
        a.x < b.x + b.w &&
        a.x + a.w > b.x &&
        a.y < b.y + b.h &&
        a.y + a.h > b.y
      );
    }

    function snapRotation(value) {
      const quarterTurn = Math.PI / 2;
      return Math.round(value / quarterTurn) * quarterTurn;
    }

    function crash() {
      game.gameOver = true;
      game.started = false;
      input.held = false;
      input.queuedJump = false;
      statusValue.textContent = "Crashed";
      overlayTitle.textContent = "Crash";
      overlayText.textContent = "The cube clipped an obstacle. Restart and try the section again.";
      startButton.textContent = "Try Again";
      overlay.classList.remove("hidden");
    }

    function drawBackground() {
      const offset = -(game.distance * 0.25) % width;
      ctx.fillStyle = "#081121";
      ctx.fillRect(0, 0, width, height);

      for (let i = -1; i < 3; i++) {
        const x = offset + i * width;
        ctx.fillStyle = "rgba(34, 99, 166, 0.16)";
        drawMountain(x + 80, groundY - 20, 260, 200);
        drawMountain(x + 340, groundY + 10, 320, 250);
        ctx.fillStyle = "rgba(10, 32, 63, 0.3)";
        drawMountain(x + 620, groundY + 40, 420, 320);
      }

      const bars = 12;
      for (let i = 0; i < bars; i++) {
        const x = ((i * 170) - (game.distance * 0.5)) % (width + 180);
        ctx.fillStyle = "rgba(255, 255, 255, 0.07)";
        ctx.fillRect(x, 70 + (i % 4) * 14, 100, 4);
      }
    }

    function drawMountain(x, baseY, w, h) {
      ctx.beginPath();
      ctx.moveTo(x, baseY);
      ctx.lineTo(x + w * 0.35, baseY - h);
      ctx.lineTo(x + w, baseY);
      ctx.closePath();
      ctx.fill();
    }

    function drawGround() {
      ctx.fillStyle = "rgba(6, 13, 26, 0.85)";
      ctx.fillRect(0, groundY, width, height - groundY);

      const bandOffset = -(game.distance * 0.9) % 120;
      for (let i = -2; i < Math.ceil(width / 120) + 2; i++) {
        const x = bandOffset + i * 120;
        ctx.fillStyle = i % 2 === 0 ? "#0f1c3b" : "#173461";
        ctx.fillRect(x, groundY + 14, 80, 24);
      }

      ctx.strokeStyle = "rgba(51, 240, 255, 0.9)";
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.moveTo(0, groundY);
      ctx.lineTo(width, groundY);
      ctx.stroke();
    }

    function drawCourse() {
      for (const obj of layout) {
        const rect = getObjectRect(obj);
        if (rect.x + rect.w < -120 || rect.x > width + 120) {
          continue;
        }

        if (obj.type === "spike") {
          const grd = ctx.createLinearGradient(rect.x, rect.y, rect.x, rect.y + rect.h);
          grd.addColorStop(0, "#ffb84d");
          grd.addColorStop(1, "#ff5d5d");
          ctx.fillStyle = grd;
          ctx.beginPath();
          ctx.moveTo(rect.x, rect.y + rect.h);
          ctx.lineTo(rect.x + rect.w / 2, rect.y);
          ctx.lineTo(rect.x + rect.w, rect.y + rect.h);
          ctx.closePath();
          ctx.fill();
        } else {
          const grd = ctx.createLinearGradient(rect.x, rect.y, rect.x, rect.y + rect.h);
          grd.addColorStop(0, "#39e7ff");
          grd.addColorStop(1, "#256bff");
          ctx.fillStyle = grd;
          ctx.fillRect(rect.x, rect.y, rect.w, rect.h);

          ctx.strokeStyle = "rgba(255, 255, 255, 0.3)";
          ctx.strokeRect(rect.x + 1.5, rect.y + 1.5, rect.w - 3, rect.h - 3);
        }
      }

      const finishX = game.courseLength - game.distance + width * 0.25;
      if (finishX > -60 && finishX < width + 60) {
        ctx.fillStyle = "rgba(255, 255, 255, 0.7)";
        ctx.fillRect(finishX, groundY - 220, 10, 220);
        for (let i = 0; i < 8; i++) {
          ctx.fillStyle = i % 2 === 0 ? "#ffffff" : "#ff4d8d";
          ctx.fillRect(finishX + 10, groundY - 220 + i * 26, 42, 26);
        }
      }
    }

    function drawPlayer() {
      for (const piece of player.trail) {
        ctx.globalAlpha = Math.max(0, piece.life / 0.45) * 0.55;
        ctx.fillStyle = "#33f0ff";
        ctx.fillRect(piece.x - 10, piece.y - 10, 20, 20);
      }
      ctx.globalAlpha = 1;

      ctx.save();
      ctx.translate(player.x + player.size / 2, player.y + player.size / 2);
      ctx.rotate(player.rotation);

      const body = ctx.createLinearGradient(-player.size / 2, -player.size / 2, player.size / 2, player.size / 2);
      body.addColorStop(0, "#ffffff");
      body.addColorStop(0.2, "#7cfdff");
      body.addColorStop(1, "#2d66ff");
      ctx.fillStyle = body;
      ctx.fillRect(-player.size / 2, -player.size / 2, player.size, player.size);

      ctx.strokeStyle = "rgba(0, 0, 0, 0.28)";
      ctx.lineWidth = 3;
      ctx.strokeRect(-player.size / 2, -player.size / 2, player.size, player.size);

      ctx.fillStyle = "#041325";
      ctx.fillRect(-9, -8, 7, 7);
      ctx.fillRect(4, -8, 7, 7);
      ctx.fillStyle = "#ff4d8d";
      ctx.fillRect(-10, 8, 22, 5);
      ctx.restore();
    }

    function render() {
      drawBackground();
      drawGround();
      drawCourse();
      drawPlayer();

      if (!game.started && !game.gameOver && !game.finished) {
        ctx.fillStyle = "rgba(255,255,255,0.85)";
        ctx.font = "700 22px Trebuchet MS";
        ctx.fillText("Press Space / Click / Tap to jump", 26, height - 28);
      }
    }

    function loop(timestamp) {
      const delta = Math.min(0.032, (timestamp - lastTime) / 1000 || 0);
      lastTime = timestamp;
      update(delta);
      render();
      requestAnimationFrame(loop);
    }

    function pressAction(event) {
      if (event.target.closest("button")) {
        return;
      }
      input.held = true;
      jump();
    }

    function releaseAction() {
      input.held = false;
      input.queuedJump = false;
    }

    startButton.addEventListener("click", () => {
      if (game.gameOver || game.finished) {
        resetGame(true);
      }
      startGame();
    });
    restartButton.addEventListener("click", () => resetGame(true));
    jumpButton.addEventListener("pointerdown", () => {
      input.held = true;
      jump();
    });
    jumpButton.addEventListener("pointerup", releaseAction);
    jumpButton.addEventListener("pointercancel", releaseAction);
    jumpButton.addEventListener("pointerleave", releaseAction);
    window.addEventListener("resize", resize);
    window.addEventListener("keydown", event => {
      if (event.code === "Space" || event.code === "ArrowUp") {
        event.preventDefault();
        if (event.repeat) {
          return;
        }
        input.held = true;
        jump();
      } else if (event.code === "KeyR") {
        resetGame(true);
      }
    });
    window.addEventListener("keyup", event => {
      if (event.code === "Space" || event.code === "ArrowUp") {
        releaseAction();
      }
    });
    window.addEventListener("pointerdown", pressAction);
    window.addEventListener("pointerup", releaseAction);
    window.addEventListener("pointercancel", releaseAction);

    resize();
    resetGame(false);
    requestAnimationFrame(loop);
  </script>
</body>
</html>
