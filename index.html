<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Black Fur</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            background: #0d0d0f;
            color: #d7d7d7;
            line-height: 1.6;
        }

        header {
            background: #050505;
            color: white;
            padding: 56px 24px;
            border-bottom: 6px solid #555555;
            position: relative;
        }

        .header-content,
        main {
            width: min(900px, 92%);
            margin: 0 auto;
        }

        .tagline {
            color: #b8b8b8;
            font-size: 1.1rem;
            margin: 8px 0 0;
        }

        .roblox-logo {
            color: #ffffff;
            display: block;
            height: 48px;
            position: absolute;
            right: 24px;
            top: 18px;
            transition: opacity 0.2s ease, transform 0.2s ease;
            width: 48px;
        }

        .roblox-logo:hover {
            opacity: 0.75;
            transform: scale(1.05);
        }

        .roblox-logo svg {
            display: block;
            height: 100%;
            width: 100%;
        }

        h1 {
            font-size: clamp(2.4rem, 7vw, 4.5rem);
            line-height: 1;
            margin: 0;
            letter-spacing: 0;
        }

        h2 {
            margin-top: 0;
            color: #ffffff;
        }

        main {
            padding: 34px 0;
        }

        section {
            background: #1a1a1d;
            padding: 26px;
            margin-bottom: 18px;
            border: 1px solid #3a3a3d;
            border-radius: 8px;
            box-shadow: 0 10px 28px rgba(0, 0, 0, 0.35);
        }

        .link-button {
            display: inline-block;
            margin-top: 10px;
            padding: 12px 18px;
            background: #5c5c5f;
            color: white;
            text-decoration: none;
            border-radius: 6px;
            font-weight: bold;
            transition: background 0.2s ease, transform 0.2s ease;
        }

        .link-button:hover {
            background: #77777a;
            transform: translateY(-2px);
        }

        footer {
            width: min(900px, 92%);
            margin: 0 auto;
            padding: 0 0 32px;
            color: #999999;
            font-size: 0.95rem;
            text-align: center;
        }

        .social-links {
            align-items: center;
            display: flex;
            flex-wrap: wrap;
            gap: 22px;
            justify-content: center;
        }

        .social-link {
            align-items: center;
            color: #d7d7d7;
            display: inline-flex;
            font-weight: bold;
            gap: 10px;
            text-decoration: none;
            transition: color 0.2s ease, transform 0.2s ease;
        }

        .social-link:hover {
            color: #ffffff;
            transform: translateY(-2px);
        }

        .youtube-logo,
        .discord-logo {
            display: block;
        }

        .youtube-logo {
            height: 30px;
            width: 42px;
        }

        .discord-logo {
            height: 34px;
            width: 44px;
        }
    </style>
</head>
<body>
    <header>
        <a class="roblox-logo" href="https://www.roblox.com/communities/724438983/Black-Fur#!/about" target="_blank" rel="noopener noreferrer" aria-label="Black Fur Roblox community">
            <svg viewBox="0 0 100 100" aria-hidden="true">
                <defs>
                    <mask id="roblox-hole">
                        <rect width="100" height="100" fill="white"></rect>
                        <rect x="42" y="42" width="16" height="16" fill="black"></rect>
                    </mask>
                </defs>
                <rect x="16" y="16" width="68" height="68" rx="3" fill="currentColor" transform="rotate(15 50 50)" mask="url(#roblox-hole)"></rect>
            </svg>
        </a>

        <div class="header-content">
            <h1>Black Fur</h1>
            <p class="tagline"></p>
        </div>
    </header>

    <main>
        <section>
            <h2>About</h2>
            <p>
                Black Fur, aka 'VGI', is a roblox development group by VinnerDevelops(Estanni).
            </p>
            <p>We have made games such as: World Of Chaos, Far Facilities.</p>
        </section>

        <section>
            <h2>Black Fur Games</h2>
            <p>
                Join the community!
            </p>
            <a class="link-button" href="https://www.roblox.com/communities/724438983/Black-Fur#!/about" target="_blank" rel="noopener noreferrer">
                Roblox Community
            </a>
        </section>
    </main>

    <footer>
        <div class="social-links">
            <a class="social-link" href="https://www.youtube.com/@BlackFurVGI" target="_blank" rel="noopener noreferrer" aria-label="Black Fur VGI YouTube channel">
                <svg class="youtube-logo" viewBox="0 0 42 30" aria-hidden="true">
                    <rect width="42" height="30" rx="7" fill="#ff0000"></rect>
                    <path d="M17 9.5L28 15L17 20.5Z" fill="#ffffff"></path>
                </svg>
                YouTube
            </a>

            <a class="social-link" href="https://discord.gg/Jc89dzqQXK" target="_blank" rel="noopener noreferrer" aria-label="Black Fur Discord server">
                <svg class="discord-logo" viewBox="-3 0 50 36" aria-hidden="true">
                    <defs>
                        <path id="discord-logo-half" d="M22 5.1C19.6 4.8 17.2 4.8 14.8 5.1C14.5 4.4 14 3.5 13.6 2.8C10.4 3.2 7.4 4.1 4.6 5.4C-1.1 13.8 -2.6 22 0.7 30C4.5 32.8 8.2 34.5 11.8 35.6C12.7 34.4 13.5 33.1 14.2 31.7C12.9 31.2 11.7 30.6 10.6 29.8C10.9 29.6 11.2 29.3 11.5 29.1C14.8 30.6 18.4 31.4 22 31.5Z"></path>
                        <mask id="discord-logo-eyes">
                            <rect x="-3" y="0" width="50" height="36" fill="white"></rect>
                            <circle cx="15.1" cy="20.8" r="3.8" fill="black"></circle>
                            <circle cx="28.9" cy="20.8" r="3.8" fill="black"></circle>
                        </mask>
                    </defs>
                    <g mask="url(#discord-logo-eyes)">
                        <use href="#discord-logo-half" fill="#5865f2"></use>
                        <use href="#discord-logo-half" fill="#5865f2" transform="translate(44 0) scale(-1 1)"></use>
                    </g>
                </svg>
                Discord
            </a>
        </div>
    </footer>
</body>
</html>
